services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - agent_files:/app/files
    command: sh -c "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      LANGFUSE_HOST: http://langfuse:3000
      OTEL_SDK_DISABLED: "true"
    networks:
      - agent-orchestration-network

  telegram-bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    command: python -m app.telegram.bot
    networks:
      - agent-orchestration-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4000:3000"
    env_file: .env
    environment:
      # BACKEND_URL uses the Docker service name — never exposed to the browser
      - BACKEND_URL=http://backend:8000
      # WS is still direct-to-backend from the browser; use localhost for local dev
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - agent-orchestration-network

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      # Use Supabase Session Pooler URL (port 5432, not 6543) + sslmode=require
      # Set LANGFUSE_DATABASE_URL in your .env file.
      - DATABASE_URL=${LANGFUSE_DATABASE_URL}
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-changeme-langfuse-secret-32chars!!}
      - SALT=${LANGFUSE_SALT:-changeme-langfuse-salt-value-here}
      - TELEMETRY_ENABLED=false
      - NEXT_PUBLIC_SIGN_UP_DISABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
    networks:
      - agent-orchestration-network

  langgraph-redis:
    image: redis:7-alpine
    networks:
      - agent-orchestration-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  langgraph-server:
    # Uses the same image as the backend (all deps pre-installed).
    # Runs `langgraph dev` which reads langgraph.json → dispatcher.py:make_graph.
    # Exposes the LangGraph Server REST+SSE API on port 8123.
    # No license key required — `langgraph dev` is the open-source dev server.
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8123:8123"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: langgraph dev --host 0.0.0.0 --port 8123 --no-browser
    depends_on:
      langgraph-redis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      REDIS_URI: redis://langgraph-redis:6379
      LANGCHAIN_TRACING_V2: "false"
      OTEL_SDK_DISABLED: "true"
    networks:
      - agent-orchestration-network

volumes:
  agent_files:

networks:
  agent-orchestration-network:
    driver: bridge
    enable_ipv6: true
