<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 410" width="880" height="410" role="img" aria-label="Customer Support Triage workflow diagram">
  <title>Customer Support Triage</title>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="410" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ── Input node ─────────────────────────────────────────────── -->
  <rect x="15" y="168" width="110" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="70" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#475569">Input</text>
  <text x="70" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">support request</text>

  <!-- Arrow: Input → Classifier -->
  <line x1="125" y1="198" x2="177" y2="198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Classifier node (amber — router role) ───────────────────── -->
  <rect x="179" y="143" width="170" height="110" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <rect x="179" y="143" width="170" height="5" rx="3" fill="#d97706"/>
  <text x="264" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#92400e">🗂️ Classifier</text>
  <text x="264" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#b45309">Triage Classifier</text>
  <text x="264" y="209" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#d97706" font-style="italic">outputs JSON → category field</text>
  <text x="264" y="226" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#92400e">routes → technical / billing / general</text>
  <!-- "conditional routing" badge on top right of node -->
  <rect x="256" y="233" width="87" height="16" rx="4" fill="#fde68a"/>
  <text x="299" y="245" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" fill="#92400e" font-weight="600">conditional routing</text>

  <!-- ── Branching edges (dashed indigo = conditional) ───────────── -->

  <!-- Classifier → Technical Support -->
  <path d="M 349,162 C 398,162 398,75 445,75"
        stroke="#6366f1" stroke-width="1.5" fill="none" stroke-dasharray="5,3"
        marker-end="url(#arr-c)"/>
  <!-- label "technical" -->
  <rect x="356" y="100" width="64" height="18" rx="4" fill="#e0e7ff"/>
  <text x="388" y="113" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" font-weight="700" fill="#4338ca">technical</text>

  <!-- Classifier → Billing Support (straight) -->
  <line x1="349" y1="198" x2="443" y2="198"
        stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr-c)"/>
  <!-- label "billing" -->
  <rect x="357" y="181" width="50" height="16" rx="4" fill="#e0e7ff"/>
  <text x="382" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" font-weight="700" fill="#4338ca">billing</text>

  <!-- Classifier → General Support -->
  <path d="M 349,234 C 398,234 398,315 445,315"
        stroke="#6366f1" stroke-width="1.5" fill="none" stroke-dasharray="5,3"
        marker-end="url(#arr-c)"/>
  <!-- label "general" -->
  <rect x="354" y="270" width="58" height="16" rx="4" fill="#e0e7ff"/>
  <text x="383" y="282" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.5" font-weight="700" fill="#4338ca">general</text>

  <!-- ── Technical Support agent ────────────────────────────────── -->
  <rect x="447" y="30" width="190" height="90" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <rect x="447" y="30" width="190" height="5" rx="3" fill="#6366f1"/>
  <text x="542" y="60" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.5" font-weight="700" fill="#4338ca">🔧 Technical Support</text>
  <text x="542" y="77" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#818cf8">Technical Support Specialist</text>
  <rect x="462" y="88" width="74" height="18" rx="4" fill="#c7d2fe"/>
  <text x="499" y="101" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#3730a3">web_search</text>
  <rect x="544" y="88" width="72" height="18" rx="4" fill="#c7d2fe"/>
  <text x="580" y="101" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#3730a3">calculator</text>

  <!-- ── Billing Support agent ──────────────────────────────────── -->
  <rect x="447" y="153" width="190" height="90" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <rect x="447" y="153" width="190" height="5" rx="3" fill="#6366f1"/>
  <text x="542" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.5" font-weight="700" fill="#4338ca">💳 Billing Support</text>
  <text x="542" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#818cf8">Billing Specialist</text>
  <rect x="492" y="211" width="100" height="18" rx="4" fill="#c7d2fe"/>
  <text x="542" y="224" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#3730a3">calculator</text>

  <!-- ── General Support agent ──────────────────────────────────── -->
  <rect x="447" y="270" width="190" height="90" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <rect x="447" y="270" width="190" height="5" rx="3" fill="#6366f1"/>
  <text x="542" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.5" font-weight="700" fill="#4338ca">💬 General Support</text>
  <text x="542" y="317" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#818cf8">Support Agent</text>
  <rect x="492" y="328" width="100" height="18" rx="4" fill="#c7d2fe"/>
  <text x="542" y="341" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#3730a3">web_search</text>

  <!-- ── Convergence edges (solid grey = sequential) ────────────── -->

  <!-- Technical Support → Output -->
  <path d="M 637,75 C 682,75 682,198 728,198"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Billing Support → Output (straight) -->
  <line x1="637" y1="198" x2="726" y2="198"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- General Support → Output -->
  <path d="M 637,315 C 682,315 682,198 728,198"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ── Output node ────────────────────────────────────────────── -->
  <rect x="730" y="168" width="122" height="60" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="791" y="195" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#15803d">Output</text>
  <text x="791" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#86efac">Resolution</text>

  <!-- ── Legend ─────────────────────────────────────────────────── -->
  <rect x="16" y="300" width="148" height="64" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="316" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#475569">LEGEND</text>
  <!-- solid line -->
  <line x1="28" y1="328" x2="62" y2="328" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="68" y="332" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">sequential edge</text>
  <!-- dashed line -->
  <line x1="28" y1="344" x2="62" y2="344" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="68" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">conditional edge</text>
  <!-- note -->
  <text x="90" y="358" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" fill="#94a3b8" font-style="italic">only 1 branch executes per run</text>

  <!-- Caption -->
  <text x="440" y="393" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8" font-style="italic">Customer Support Triage · Conditional routing via add_conditional_edges() · Only the matched branch executes</text>
</svg>
