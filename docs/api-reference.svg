  <text x="745" y="163" font-family="Courier New,monospace" font-size="9" fill="#374151">/{key}/raw</text>
  <line x1="689" y1="173" x2="906" y2="173" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Secrets note -->
  <rect x="697" y="183" width="200" height="32" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="797" y="197" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#64748b">Sensitive values returned as</text>
