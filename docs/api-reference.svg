  <text x="268" y="189" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#15803d">GET</text>
  <text x="295" y="189" font-family="Courier New,monospace" font-size="9" fill="#374151">/workflows/{id}</text>
