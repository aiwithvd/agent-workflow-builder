  <text x="295" y="137" font-family="Courier New,monospace" font-size="9" fill="#374151">/workflows</text>
  <line x1="239" y1="147" x2="454" y2="147" stroke="#f1f5f9" stroke-width="1"/>

  <rect x="247" y="151" width="42" height="16" rx="3" fill="#dcfce7"/>
  <text x="268" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#15803d">GET</text>
  <text x="295" y="163" font-family="Courier New,monospace" font-size="9" fill="#374151">/workflows/templates</text>
