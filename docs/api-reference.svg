  <rect x="14" y="74" width="215" height="17" fill="#6366f1"/>
  <text x="121" y="78" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Agents</text>
  <text x="121" y="91" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#c7d2fe">/api/v1/agents</text>

  <rect x="22" y="99" width="42" height="16" rx="3" fill="#dcfce7"/>
  <text x="43" y="111" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#15803d">GET</text>
  <text x="70" y="111" font-family="Courier New,monospace" font-size="9" fill="#374151">/agents</text>
