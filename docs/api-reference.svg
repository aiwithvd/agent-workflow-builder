  <rect x="697" y="99" width="42" height="16" rx="3" fill="#dcfce7"/>
  <text x="718" y="111" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#15803d">GET</text>
