  <text x="723" y="279" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" font-weight="700" fill="#1d4ed8">POST</text>
  <text x="745" y="279" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">create</text>
  <rect x="800" y="252" width="38" height="13" rx="2" fill="#fef3c7"/>
  <text x="819" y="263" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" font-weight="700" fill="#92400e">PATCH</text>
  <text x="844" y="263" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#475569">update</text>
  <rect x="800" y="268" width="32" height="13" rx="2" fill="#fee2e2"/>
