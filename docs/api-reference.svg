<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 345" width="920" height="345" role="img" aria-label="REST API Reference">
  <title>REST API Reference</title>

  <!-- Background -->
  <rect width="920" height="345" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="460" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1e293b">REST API Reference</text>
  <text x="460" y="46" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#94a3b8">All endpoints share base path /api/v1  --  Full OpenAPI docs at /docs</text>

  <!-- COLUMN 1 - AGENTS -->
  <rect x="14" y="55" width="215" height="264" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1"/>
