  <text x="43" y="137" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#15803d">GET</text>
  <text x="70" y="137" font-family="Courier New,monospace" font-size="9" fill="#374151">/agents/presets</text>
